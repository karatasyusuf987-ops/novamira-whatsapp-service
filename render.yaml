# Render.com Blueprint — push to GitHub, then "New > Blueprint" on Render and
# pick this repo. Render reads this file and provisions everything for you.
services:
  - type: web
    name: whatsapp-service
    runtime: docker
    plan: starter            # $7/mo persistent disk; "free" plan has no disk
    region: frankfurt
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: wa-session
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BACKEND_WEBHOOK_URL
        value: https://www.novamiraplatform.com/api/whatsapp/webhook
      - key: BACKEND_BASE_URL
        value: https://www.novamiraplatform.com
      - key: SESSION_PATH
        value: /data/.wwebjs_auth
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
